name: Scrape Jobs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chromeインストール
        uses: browser-actions/setup-chrome@v1

      - name: ライブラリ
        run: pip install -r requirements.txt

      - name: 実行
        run: python scraper.py

      - name: push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add wantedly_jobs.csv
          git commit -m "update jobs" || echo "no change"
          git pull --rebase
          git push
